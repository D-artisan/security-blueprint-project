global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # configure Alertmanager URL here for production

scrape_configs:
  - job_name: "security-blueprint-api"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics